<div class="share-section">
    <div class="dropdown">
        <button class="btn btn-outline-secondary border-0 rounded-pill" type="button" id="shareDropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" title="Share">
            <i class="bi bi-box-arrow-up"></i>
        </button>
        <div class="dropdown-menu dropdown-menu-right" aria-labelledby="shareDropdown">
            <button class="dropdown-item" onclick="copyLink()">
                <i class="bi bi-link-45deg"></i> Copy link
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" type="button" onclick="openSharePopup('bluesky', 'bluesky-share')">
                <i class="bi bi-bluesky mr-1"></i> Share on Bluesky
            </button>
            <button class="dropdown-item" type="button" onclick="openSharePopup('facebook', 'facebook-share')">
                <i class="bi bi-facebook mr-1"></i> Share on Facebook
            </button>
            <button class="dropdown-item" type="button" onclick="openSharePopup('linkedin', 'linkedin-share')">
                <i class="bi bi-linkedin mr-1"></i> Share on LinkedIn
            </button>
            <button class="dropdown-item" type="button" onclick="openSharePopup('threads', 'threads-share')">
                <i class="bi bi-threads mr-1"></i> Share on Threads
            </button>
            <button class="dropdown-item" type="button" onclick="openSharePopup('x', 'twitter-share')">
                <i class="bi bi-twitter-x mr-1"></i> Share on X
            </button>
        </div>
    </div>
</div>

<script>
function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(function() {
        // Optionally show a toast or something, but for now, silent
    });
}

function buildShareUrl(platform) {
    var pageUrl = encodeURIComponent(window.location.href);

    switch (platform) {
        case 'bluesky':
            return 'https://bsky.app/intent/compose?text=' + pageUrl;
        case 'facebook':
            return 'https://www.facebook.com/sharer/sharer.php?u=' + pageUrl;
        case 'linkedin':
            return 'https://www.linkedin.com/sharing/share-offsite/?url=' + pageUrl;
        case 'threads':
            return 'https://www.threads.com/intent/post?text=' + pageUrl;
        case 'x':
            return 'https://twitter.com/intent/tweet?url=' + pageUrl;
        default:
            return window.location.href;
    }
}

function openSharePopup(platform, name) {
    var url = buildShareUrl(platform);
    var width = 560;
    var height = 480;
    var left = (window.screen.width / 2) - (width / 2);
    var top = (window.screen.height / 2) - (height / 2);
    window.open(url, name, 'toolbar=no,location=no,status=no,menubar=no,scrollbars=yes,resizable=yes,width=' + width + ',height=' + height + ',top=' + top + ',left=' + left);
    return false;
}
</script>
